services:
  backend:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./cameras.json:/app/cameras.json:ro
      - ./models:/app/models:ro

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - FASTAPI_ORIGIN=http://backend:8080
    depends_on:
      - backend
