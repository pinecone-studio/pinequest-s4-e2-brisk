# ByteTrack config for the littering pipeline.
# track_buffer raised from 30 → 60 so an object briefly missed for a few frames
# (occlusion, motion blur, low confidence) keeps its ID instead of spawning a new one.

tracker_type: bytetrack
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.25
track_buffer: 60        # 2× default — survives ~6 s of gaps at 10 fps
match_thresh: 0.8
fuse_score: True
